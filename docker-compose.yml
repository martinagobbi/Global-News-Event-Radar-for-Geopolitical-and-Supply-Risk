version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pipeline_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - pipeline_network
      
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pipeline_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - pipeline_network

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: pipeline_clickhouse
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - pipeline_network
      
  # Layer 1: Data ingestion
  ingestion:
    build:
      context: ./1-ingestion
      dockerfile: Dockerfile
    container_name: pipeline_ingestion
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network

  # Layer 2: Parsing
  parsing:
    build:
      context: ./2-parsing
      dockerfile: Dockerfile
    container_name: pipeline_parsing
    depends_on:
      - ingestion
      - kafka
      - clickhouse
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_EVENTS: gdelt_events_raw
      KAFKA_TOPIC_MENTIONS: gdelt_mentions_raw
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      MENTION_ENRICH_WORKERS: "8"
      MENTION_ENRICH_NLP: "1"
      ENRICH_ONLY_RELEVANT: "1"
    volumes:
      - shared_data:
      - clickhouse_data:
    networks:
      - pipeline_network

  # Layer 3: Validation
  validation:
    build:
      context: ./3-validation
      dockerfile: Dockerfile
    container_name: pipeline_validation
    depends_on:
      - parsing
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network

  # Layer 4: Processing
  processing:
    build:
      context: ./4-processing
      dockerfile: Dockerfile
    container_name: pipeline_processing
    depends_on:
      - validation
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network

  # Layer 5: Serving
  serving:
    build:
      context: ./5-serving
      dockerfile: Dockerfile
    container_name: pipeline_serving
    depends_on:
      - processing
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network
    ports:
      - "8501:8501"

volumes:
  shared_data:

networks:
  pipeline_network:
