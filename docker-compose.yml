services:

  # ── Coordination: 3-node ClickHouse Keeper ensemble (quorum) ──────────────
  clickhouse-keeper-1:
    image: clickhouse/clickhouse-keeper:24.3
    container_name: pipeline_ch_keeper_1
    volumes:
      - ./clickhouse/keeper-1.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - keeper_1_data:/var/lib/clickhouse-keeper
    networks:
      - pipeline_network

  clickhouse-keeper-2:
    image: clickhouse/clickhouse-keeper:24.3
    container_name: pipeline_ch_keeper_2
    volumes:
      - ./clickhouse/keeper-2.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - keeper_2_data:/var/lib/clickhouse-keeper
    networks:
      - pipeline_network

  clickhouse-keeper-3:
    image: clickhouse/clickhouse-keeper:24.3
    container_name: pipeline_ch_keeper_3
    volumes:
      - ./clickhouse/keeper-3.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - keeper_3_data:/var/lib/clickhouse-keeper
    networks:
      - pipeline_network

  # ── Long-term store: 2 shards × 3 replicas (6 ClickHouse nodes) ───────────
  # Shard 1
  clickhouse-s1r1:
    image: clickhouse/clickhouse-server:24.3
    container_name: pipeline_clickhouse_s1r1
    depends_on: [clickhouse-keeper-1, clickhouse-keeper-2, clickhouse-keeper-3]
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    volumes:
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/macros-s1r1.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/zz-network-access.xml:ro
      - ch_s1r1_data:/var/lib/clickhouse
    networks:
      - pipeline_network

  clickhouse-s1r2:
    image: clickhouse/clickhouse-server:24.3
    container_name: pipeline_clickhouse_s1r2
    depends_on: [clickhouse-keeper-1, clickhouse-keeper-2, clickhouse-keeper-3]
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    volumes:
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/macros-s1r2.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/zz-network-access.xml:ro
      - ch_s1r2_data:/var/lib/clickhouse
    networks:
      - pipeline_network

  clickhouse-s1r3:
    image: clickhouse/clickhouse-server:24.3
    container_name: pipeline_clickhouse_s1r3
    depends_on: [clickhouse-keeper-1, clickhouse-keeper-2, clickhouse-keeper-3]
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    volumes:
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/macros-s1r3.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/zz-network-access.xml:ro
      - ch_s1r3_data:/var/lib/clickhouse
    networks:
      - pipeline_network

  # Shard 2
  clickhouse-s2r1:
    image: clickhouse/clickhouse-server:24.3
    container_name: pipeline_clickhouse_s2r1
    depends_on: [clickhouse-keeper-1, clickhouse-keeper-2, clickhouse-keeper-3]
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    volumes:
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/macros-s2r1.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/zz-network-access.xml:ro
      - ch_s2r1_data:/var/lib/clickhouse
    networks:
      - pipeline_network

  clickhouse-s2r2:
    image: clickhouse/clickhouse-server:24.3
    container_name: pipeline_clickhouse_s2r2
    depends_on: [clickhouse-keeper-1, clickhouse-keeper-2, clickhouse-keeper-3]
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    volumes:
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/macros-s2r2.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/zz-network-access.xml:ro
      - ch_s2r2_data:/var/lib/clickhouse
    networks:
      - pipeline_network

  clickhouse-s2r3:
    image: clickhouse/clickhouse-server:24.3
    container_name: pipeline_clickhouse_s2r3
    depends_on: [clickhouse-keeper-1, clickhouse-keeper-2, clickhouse-keeper-3]
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    volumes:
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/macros-s2r3.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/zz-network-access.xml:ro
      - ch_s2r3_data:/var/lib/clickhouse
    networks:
      - pipeline_network

   # ── MongoDB: replica set a 3 nodi (per i profili utente del serving) ───────
  mongo1:
    image: mongo:7
    container_name: pipeline_mongo1
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo1_data:/data/db
    networks:
      - pipeline_network

  mongo2:
    image: mongo:7
    container_name: pipeline_mongo2
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo2_data:/data/db
    networks:
      - pipeline_network

  mongo3:
    image: mongo:7
    container_name: pipeline_mongo3
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo3_data:/data/db
    networks:
      - pipeline_network

  # Layer 1: Data ingestion
  ingestion:
    build:
      context: ./1-ingestion
      dockerfile: Dockerfile
    container_name: pipeline_ingestion
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network

  # Layer 2: Parsing
  parsing:
    build:
      context: ./2-parsing
      dockerfile: Dockerfile
    container_name: pipeline_parsing
    depends_on:
      - ingestion
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network

  # Layer 3: Validation + storage owner (writes to the replicated cluster)
  validation:
    build:
      context: ./3-validation_and_storage
      dockerfile: Dockerfile
    container_name: pipeline_validation
    depends_on:
      - parsing
      - clickhouse-s1r1   # write entry point for shard 1 (cluster handles the rest)
      - clickhouse-s2r1   # write entry point for shard 2
    environment:
      CLICKHOUSE_HOST: clickhouse-s1r1
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_CLUSTER: gnews_cluster
      LATEST_FILES_DIR: /data/latest_files
      STATUS_DIR: /data/status
      MENTION_ENRICH_WORKERS: "8"
      MENTION_ENRICH_NLP: "1"
      ENRICH_TIMEOUT_SECONDS: "600"
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network

  # Layer 4: Processing — pure reader
  processing:
    build:
      context: ./4-processing
      dockerfile: Dockerfile
    container_name: pipeline_processing
    depends_on:
      - validation
      - clickhouse-s1r1
      - clickhouse-s2r1
    environment:
      CLICKHOUSE_HOST: clickhouse-s1r1
      CLICKHOUSE_PORT: "9000"
      STATUS_DIR: /data/status
    volumes:
      - shared_data:/data
    networks:
      - pipeline_network

  # Layer 5: Serving
  # ── Serving: managed by the separate compose file in 5-serving/ ───────────
  # Not defined here — the compose file in 5-serving/docker-compose.yml
  # declares pipeline_network as an external network and attaches to it.
  # To start the full stack:
  #   1. docker compose up -d          (this file — creates pipeline_network)
  #   2. docker compose -f 5-serving/docker-compose.yml up -d

volumes:
  shared_data:
  keeper_1_data:
  keeper_2_data:
  keeper_3_data:
  ch_s1r1_data:
  ch_s1r2_data:
  ch_s1r3_data:
  ch_s2r1_data:
  ch_s2r2_data:
  ch_s2r3_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:
networks:
  pipeline_network:
